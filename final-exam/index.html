<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
<title>index</title>
<style>
*{margin:0;padding:0;box-sizing:border-box}
:root{
  --bg:#0f1117;--surface:#1a1d27;--card:#222536;--card-hover:#2a2e42;
  --border:#2e3348;--text:#e4e6f0;--text2:#9ca0b8;--accent:#6c7cff;
  --accent2:#4ecdc4;--accent3:#ff6b9d;--accent4:#ffd93d;
  --green:#4ecdc4;--red:#ff6b9d;--radius:12px;--shadow:0 4px 24px rgba(0,0,0,.3);
}
[data-theme="light"]{
  --bg:#f0f2f5;--surface:#ffffff;--card:#ffffff;--card-hover:#f5f7fa;
  --border:#e0e4ea;--text:#1a1d27;--text2:#6b7280;--accent:#5b6bff;
  --accent2:#0d9488;--accent3:#e11d48;--accent4:#d97706;
  --green:#0d9488;--red:#e11d48;--shadow:0 4px 24px rgba(0,0,0,.08);
}
[data-theme="light"] .topbar{background:rgba(255,255,255,.88)}
[data-theme="light"] pre{background:#f8f9fb;color:#1e293b}
html{-webkit-text-size-adjust:100%}
body{font-family:'Segoe UI','Microsoft YaHei',sans-serif;background:var(--bg);color:var(--text);min-height:100vh;display:flex;transition:background .3s;-webkit-tap-highlight-color:transparent}

/* ===== Sidebar ===== */
.sidebar{width:260px;min-height:100vh;background:var(--surface);border-right:1px solid var(--border);display:flex;flex-direction:column;position:fixed;top:0;left:0;z-index:100;transition:transform .3s}
.sidebar-header{padding:20px 16px 14px;border-bottom:1px solid var(--border)}
.sidebar-header h1{font-size:18px;font-weight:700;background:linear-gradient(135deg,var(--accent),var(--accent2));-webkit-background-clip:text;-webkit-text-fill-color:transparent}
.sidebar-header p{font-size:11px;color:var(--text2);margin-top:4px}
.nav-subjects{flex:1;overflow-y:auto;padding:10px}
.nav-subject{margin-bottom:6px}
.nav-subject-btn{width:100%;display:flex;align-items:center;gap:8px;padding:10px 12px;border:none;border-radius:var(--radius);background:transparent;color:var(--text);font-size:13px;font-weight:600;cursor:pointer;transition:all .2s;text-align:left}
.nav-subject-btn:hover{background:var(--card)}
.nav-subject-btn.active{background:var(--accent);color:#fff}
.nav-subject-btn .icon{font-size:18px;width:24px;text-align:center}
.nav-subject-title{display:flex;align-items:center;gap:8px;flex:1;min-width:0}
.nav-toggle{width:24px;height:24px;display:flex;align-items:center;justify-content:center;border-radius:6px;font-size:12px;cursor:pointer;transition:all .2s;color:var(--text2);flex-shrink:0}
.nav-toggle:hover{background:var(--card);color:var(--text)}
.nav-subject-btn.active .nav-toggle{color:#fff}
.nav-toggle.open{transform:rotate(90deg)}
.nav-chapters{padding:4px 0 4px 16px;display:none}
.nav-chapters.show{display:block}
.nav-chapter{padding:7px 12px;font-size:12px;color:var(--text2);cursor:pointer;border-radius:8px;transition:all .2s;margin-bottom:2px}
.nav-chapter:hover{background:var(--card);color:var(--text)}
.nav-chapter.active{color:var(--accent);background:rgba(108,124,255,.1);font-weight:600}
.nav-chapter .count{float:right;font-size:10px;background:var(--card);padding:1px 7px;border-radius:10px;color:var(--text2)}
.stats-bar{padding:14px 16px;border-top:1px solid var(--border);background:var(--surface)}
.stat-row{display:flex;justify-content:space-between;align-items:center;margin-bottom:6px}
.stat-label{font-size:11px;color:var(--text2)}
.stat-value{font-size:13px;font-weight:700;color:var(--accent)}
.progress-bar{height:3px;background:var(--card);border-radius:2px;overflow:hidden}
.progress-fill{height:100%;background:linear-gradient(90deg,var(--accent),var(--accent2));border-radius:2px;transition:width .5s}

/* ===== Main ===== */
.main{flex:1;margin-left:260px;min-height:100vh;padding:0}
.topbar{position:sticky;top:0;z-index:50;background:rgba(15,17,23,.88);backdrop-filter:blur(20px);-webkit-backdrop-filter:blur(20px);border-bottom:1px solid var(--border);padding:12px 24px;display:flex;align-items:center;gap:12px;flex-wrap:wrap}
.search-box{flex:1;min-width:180px;max-width:360px;position:relative}
.search-box input{width:100%;padding:9px 14px 9px 36px;border:1px solid var(--border);border-radius:var(--radius);background:var(--card);color:var(--text);font-size:13px;outline:none;transition:border .2s}
.search-box input:focus{border-color:var(--accent)}
.search-box::before{content:'🔍';position:absolute;left:10px;top:50%;transform:translateY(-50%);font-size:13px}
.topbar-actions{display:flex;gap:6px;flex-wrap:wrap}
.btn{padding:7px 14px;border:1px solid var(--border);border-radius:8px;background:var(--card);color:var(--text);font-size:12px;cursor:pointer;transition:all .2s;display:flex;align-items:center;gap:5px;white-space:nowrap}
.btn:hover{border-color:var(--accent);color:var(--accent)}
.btn.active{background:var(--accent);border-color:var(--accent);color:#fff}

/* ===== Content ===== */
.content{padding:24px 28px;max-width:920px;margin:0 auto}
.subject-title{font-size:24px;font-weight:800;margin-bottom:6px;background:linear-gradient(135deg,var(--accent),var(--accent2));-webkit-background-clip:text;-webkit-text-fill-color:transparent}
.subject-desc{color:var(--text2);margin-bottom:20px;font-size:13px}
.chapter-section{margin-bottom:32px}
.chapter-title{font-size:18px;font-weight:700;margin-bottom:16px;padding-bottom:10px;border-bottom:2px solid var(--border);display:flex;align-items:center;gap:8px}
.chapter-title .badge{font-size:11px;background:var(--accent);color:#fff;padding:2px 9px;border-radius:12px;font-weight:600;flex-shrink:0}
.ch-tabs{display:flex;gap:4px;flex-wrap:wrap;flex:1}
.ch-tab{padding:5px 12px;font-size:12px;color:var(--text2);cursor:pointer;border-radius:6px;transition:all .2s;white-space:nowrap;border:1px solid transparent}
.ch-tab:hover{background:var(--card-hover);color:var(--text)}
.ch-tab.active{color:var(--accent);background:rgba(108,124,255,.1);border-color:rgba(108,124,255,.3);font-weight:600}
.counter-bar{display:flex;gap:10px;margin-bottom:16px;flex-wrap:wrap}
.counter-item{background:var(--card);border:1px solid var(--border);border-radius:10px;padding:10px 16px;min-width:100px;text-align:center}
.counter-num{font-size:24px;font-weight:800;background:linear-gradient(135deg,var(--accent),var(--accent2));-webkit-background-clip:text;-webkit-text-fill-color:transparent}
.counter-label{font-size:11px;color:var(--text2);margin-top:2px}

/* ===== Question Card ===== */
.q-card{background:var(--card);border:1px solid var(--border);border-radius:var(--radius);padding:18px 20px;margin-bottom:14px;transition:all .25s;position:relative;overflow:hidden}
.q-card::before{content:'';position:absolute;top:0;left:0;width:4px;height:100%;background:var(--accent);opacity:0;transition:opacity .2s}
.q-card:hover{border-color:rgba(108,124,255,.4);box-shadow:0 2px 16px rgba(0,0,0,.2)}
.q-card:hover::before{opacity:1}
.q-stem{font-size:14px;font-weight:600;line-height:1.7;margin-bottom:10px;display:flex;gap:8px}
.q-num{color:var(--accent);font-weight:700;white-space:nowrap;min-width:24px}
.q-type-badge{display:inline-block;font-size:10px;padding:2px 7px;border-radius:6px;font-weight:600;margin-left:auto;white-space:nowrap;flex-shrink:0}
.q-type-single{background:rgba(108,124,255,.15);color:var(--accent)}
.q-type-multi{background:rgba(255,107,157,.15);color:var(--accent3)}
.q-type-short{background:rgba(78,205,196,.15);color:var(--accent2)}

/* ===== Options ===== */
.q-options{display:grid;grid-template-columns:1fr 1fr;gap:8px 12px;margin-bottom:10px;padding-left:32px}
.q-opt{font-size:13px;color:var(--text2);padding:8px 12px;border-radius:8px;border:2px solid transparent;transition:all .2s;cursor:pointer;line-height:1.5;user-select:none;-webkit-user-select:none}
.q-opt:hover:not(.opt-disabled){background:var(--card-hover);color:var(--text);border-color:var(--border)}
.q-opt.opt-disabled{cursor:default;opacity:.7}
.q-opt.opt-selected{border-color:var(--accent);background:rgba(108,124,255,.1);color:var(--text)}
.q-opt.opt-correct{border-color:var(--green)!important;background:rgba(78,205,196,.15)!important;color:var(--green)!important;font-weight:600;opacity:1!important}
.q-opt.opt-wrong{border-color:var(--red)!important;background:rgba(255,107,157,.12)!important;color:var(--red)!important;text-decoration:line-through;opacity:1!important}
.q-opt.correct{background:rgba(78,205,196,.12);color:var(--green);font-weight:600}

/* ===== Feedback toast ===== */
.q-feedback{margin:8px 0 8px 32px;padding:8px 14px;border-radius:8px;font-size:13px;font-weight:600;display:none;animation:fadeIn .25s}
.q-feedback.show{display:flex;align-items:center;gap:6px}
.q-feedback.fb-correct{background:rgba(78,205,196,.12);color:var(--green);border:1px solid rgba(78,205,196,.3)}
.q-feedback.fb-wrong{background:rgba(255,107,157,.12);color:var(--red);border:1px solid rgba(255,107,157,.3)}

/* ===== Answer ===== */
.q-answer{margin-top:10px;padding:10px 14px;background:rgba(78,205,196,.08);border:1px solid rgba(78,205,196,.2);border-radius:8px;font-size:13px;color:var(--green);display:none;padding-left:32px;line-height:1.7}
.q-answer.show{display:block;animation:fadeIn .3s}
.q-answer-label{font-weight:700;margin-right:6px}

/* ===== Code ===== */
.code-label{font-size:11px;color:var(--accent4);font-weight:600;margin:6px 0 4px 32px}
pre{background:#16181f;border:1px solid var(--border);border-radius:8px;padding:14px;overflow-x:auto;font-size:13px;line-height:1.6;font-family:Consolas,'Courier New',monospace;color:#c5cee0;margin:8px 0 8px 32px;-webkit-overflow-scrolling:touch}
pre code{font-family:inherit}

/* ===== Reset button ===== */
.reset-btn{display:inline-flex;align-items:center;gap:4px;margin:8px 0 0 32px;padding:5px 12px;border:1px solid var(--border);border-radius:6px;background:var(--card);color:var(--text2);font-size:11px;cursor:pointer;transition:all .2s}
.reset-btn:hover{border-color:var(--accent3);color:var(--accent3)}

/* ===== Exam Points Panel ===== */
.ep-panel{background:var(--card);border:1px solid var(--border);border-radius:var(--radius);margin-bottom:20px;overflow:hidden}
.ep-header{display:flex;align-items:center;justify-content:space-between;padding:14px 18px;cursor:pointer;transition:background .2s;user-select:none}
.ep-header:hover{background:var(--card-hover)}
.ep-header h3{font-size:15px;font-weight:700;display:flex;align-items:center;gap:8px;margin:0}
.ep-header .ep-toggle{font-size:18px;color:var(--text2);transition:transform .3s}
.ep-header .ep-toggle.open{transform:rotate(180deg)}
.ep-body{padding:0 18px;max-height:0;overflow:hidden;transition:max-height .4s ease,padding .3s}
.ep-body.open{max-height:50000px;padding:0 18px 18px}
.ep-body h4{font-size:14px;font-weight:700;color:var(--accent);margin:14px 0 8px;padding-bottom:4px;border-bottom:1px solid var(--border)}
.ep-body h4:first-child{margin-top:0}
.ep-body p,.ep-body li{font-size:13px;color:var(--text2);line-height:1.7;margin-bottom:4px}
.ep-body ul{padding-left:18px;margin-bottom:8px}
.ep-body strong{color:var(--text);font-weight:600}
.ep-body table{width:100%;border-collapse:collapse;font-size:12px;margin:8px 0}
.ep-body th,.ep-body td{border:1px solid var(--border);padding:6px 10px;text-align:left}
.ep-body th{background:var(--card-hover);font-weight:600;color:var(--text)}
.ep-body td{color:var(--text2)}
.ep-body code{background:var(--card-hover);padding:1px 5px;border-radius:4px;font-size:12px;font-family:Consolas,monospace;color:var(--accent3)}
.ep-body .ep-tag{display:inline-block;font-size:10px;padding:1px 7px;border-radius:4px;background:rgba(108,124,255,.12);color:var(--accent);margin-right:4px;font-weight:600}

/* ===== Pagination ===== */
.pagination{display:flex;align-items:center;justify-content:center;gap:6px;margin-top:24px;padding:16px 0;flex-wrap:wrap}
.page-btn{min-width:36px;height:36px;display:flex;align-items:center;justify-content:center;border:1px solid var(--border);border-radius:8px;background:var(--card);color:var(--text);font-size:13px;cursor:pointer;transition:all .2s}
.page-btn:hover{border-color:var(--accent);color:var(--accent)}
.page-btn.active{background:var(--accent);border-color:var(--accent);color:#fff}

/* ===== Animations ===== */
@keyframes fadeIn{from{opacity:0;transform:translateY(6px)}to{opacity:1;transform:translateY(0)}}
.fade-in{animation:fadeIn .35s ease}
@keyframes shake{0%,100%{transform:translateX(0)}20%,60%{transform:translateX(-4px)}40%,80%{transform:translateX(4px)}}
.shake{animation:shake .4s}
@keyframes popIn{0%{transform:scale(.8);opacity:0}50%{transform:scale(1.05)}100%{transform:scale(1);opacity:1}}
.pop-in{animation:popIn .3s}

/* ===== Mobile sidebar overlay ===== */
.sidebar-overlay{display:none;position:fixed;inset:0;background:rgba(0,0,0,.5);z-index:99}
.sidebar-overlay.show{display:block}

/* ===== Hamburger ===== */
.menu-toggle{display:none;position:fixed;top:12px;left:12px;z-index:200;width:38px;height:38px;border-radius:8px;background:var(--surface);border:1px solid var(--border);color:var(--text);font-size:18px;cursor:pointer;align-items:center;justify-content:center}

/* ===== Responsive ===== */
@media(max-width:768px){
  .sidebar{transform:translateX(-100%);width:260px}
  .sidebar.open{transform:translateX(0)}
  .sidebar-overlay.show{display:block}
  .main{margin-left:0}
  .menu-toggle{display:flex}
  .content{padding:16px 14px}
  .topbar{padding:10px 14px;gap:8px}
  .search-box{min-width:140px;max-width:none;flex:1 1 100%;order:-1}
  .topbar-actions{width:100%;justify-content:flex-start}
  .q-options{grid-template-columns:1fr;padding-left:0}
  .q-card{padding:14px 16px}
  .q-stem{font-size:13px}
  .q-opt{font-size:13px;padding:10px 12px}
  pre{padding:10px;font-size:12px;margin-left:0}
  .code-label{margin-left:0}
  .q-feedback{margin-left:0}
  .q-answer{padding-left:14px}
  .counter-bar{gap:8px}
  .counter-item{min-width:80px;padding:8px 12px}
  .counter-num{font-size:20px}
  .subject-title{font-size:20px}
  .chapter-title{font-size:16px}
  .btn{padding:7px 10px;font-size:11px}
}
@media(max-width:400px){
  .q-options{gap:6px}
  .q-opt{padding:9px 10px;font-size:12px}
  .topbar-actions{gap:4px}
  .btn{padding:6px 8px;font-size:11px}
}

/* ===== Listening Panel ===== */
.listening-panel{position:fixed;top:0;right:-480px;width:480px;max-width:90vw;height:100vh;background:var(--surface);border-left:1px solid var(--border);z-index:200;transition:right .35s cubic-bezier(.4,0,.2,1);display:flex;flex-direction:column;box-shadow:-4px 0 24px rgba(0,0,0,.3)}
.listening-panel.open{right:0}
.lp-header{padding:16px 20px;border-bottom:1px solid var(--border);display:flex;align-items:center;gap:12px;flex-shrink:0}
.lp-header h3{font-size:16px;font-weight:700;background:linear-gradient(135deg,var(--accent),var(--accent2));-webkit-background-clip:text;-webkit-text-fill-color:transparent;flex:1}
.lp-close{width:32px;height:32px;border:1px solid var(--border);border-radius:8px;background:var(--card);color:var(--text);font-size:16px;cursor:pointer;display:flex;align-items:center;justify-content:center;transition:all .2s;flex-shrink:0}
.lp-close:hover{border-color:var(--red);color:var(--red)}
.lp-body{flex:1;overflow-y:auto;padding:20px}
.lp-tabs{display:flex;gap:4px;padding:0 20px 12px;flex-wrap:wrap;flex-shrink:0;border-bottom:1px solid var(--border)}
.lp-tab{padding:6px 14px;font-size:12px;color:var(--text2);cursor:pointer;border-radius:8px;border:1px solid transparent;transition:all .2s;white-space:nowrap;font-weight:600}
.lp-tab:hover{background:var(--card);color:var(--text)}
.lp-tab.active{color:var(--accent);background:rgba(108,124,255,.1);border-color:rgba(108,124,255,.3)}
.lp-unit{display:none}
.lp-unit.active{display:block}
.lp-unit-title{font-size:17px;font-weight:700;margin-bottom:6px;color:var(--accent)}
.lp-unit-sub{font-size:12px;color:var(--text2);margin-bottom:16px}
.lp-passage{font-size:14px;line-height:2.1;color:var(--text2);text-align:justify}
.blank{display:inline-block;min-width:90px;padding:2px 10px;margin:0 3px;border-bottom:3px solid var(--accent);background:rgba(108,124,255,.08);border-radius:4px 4px 0 0;color:var(--accent);font-weight:700;text-align:center;cursor:pointer;transition:all .25s;font-size:13px;letter-spacing:.5px}
.blank:hover{background:rgba(108,124,255,.18);border-color:var(--accent2)}
.blank.revealed{border-color:var(--green);color:var(--green);background:rgba(78,205,196,.1)}
.word-tag{display:inline-block;padding:3px 10px;font-size:12px;font-weight:600;color:var(--accent3);background:rgba(255,107,157,.08);border:1px solid rgba(255,107,157,.2);border-radius:6px;cursor:pointer;transition:all .2s}
.word-tag:hover{background:rgba(255,107,157,.18)}
.word-tag.revealed{color:var(--green);border-color:var(--green);background:rgba(78,205,196,.1)}
.trans-panel{position:fixed;top:0;right:-460px;width:460px;max-width:90vw;height:100vh;background:var(--surface);border-left:1px solid var(--border);z-index:200;transition:right .35s cubic-bezier(.4,0,.2,1);display:flex;flex-direction:column;box-shadow:-4px 0 24px rgba(0,0,0,.3)}
.trans-panel.open{right:0}
.tp-header{padding:16px 20px;border-bottom:1px solid var(--border);display:flex;align-items:center;gap:12px;flex-shrink:0}
.tp-header h3{font-size:16px;font-weight:700;background:linear-gradient(135deg,var(--accent),var(--accent2));-webkit-background-clip:text;-webkit-text-fill-color:transparent;flex:1}
.tp-close{width:32px;height:32px;border:1px solid var(--border);border-radius:8px;background:var(--card);color:var(--text);font-size:16px;cursor:pointer;display:flex;align-items:center;justify-content:center;transition:all .2s;flex-shrink:0}
.tp-close:hover{border-color:var(--red);color:var(--red)}
.tp-body{flex:1;overflow-y:auto;padding:20px}
.tp-title{font-size:15px;font-weight:700;margin-bottom:4px;color:var(--accent)}
.tp-subtitle{font-size:12px;color:var(--text2);margin-bottom:14px}
.tp-text{font-size:14px;line-height:2;color:var(--text);text-align:justify}
.tp-text .tp-blank{color:var(--accent3);font-weight:700;text-decoration:underline;text-decoration-style:wavy;text-underline-offset:4px}
.trans-overlay{display:none;position:fixed;inset:0;background:rgba(0,0,0,.45);z-index:199}
.trans-overlay.show{display:block}
@media(max-width:768px){.trans-panel{width:100%;max-width:100%}}
.lp-toolbar{display:flex;gap:8px;padding:12px 20px;border-top:1px solid var(--border);flex-shrink:0}
.lp-toolbar .btn{flex:1;justify-content:center}
.listening-overlay{display:none;position:fixed;inset:0;background:rgba(0,0,0,.45);z-index:199}
.listening-overlay.show{display:block}
@media(max-width:768px){.listening-panel{width:100%;max-width:100%}}

.q-key-badge{display:inline-block;font-size:10px;padding:2px 7px;border-radius:6px;font-weight:600;background:rgba(255,217,61,.15);color:#ffd93d;border:1px solid rgba(255,217,61,.3);margin-left:6px;white-space:nowrap;flex-shrink:0}
/* ===== Scrollbar ===== */
::-webkit-scrollbar{width:5px;height:5px}
::-webkit-scrollbar-track{background:transparent}
::-webkit-scrollbar-thumb{background:var(--border);border-radius:3px}
::-webkit-scrollbar-thumb:hover{background:var(--text2)}
</style>
</head>
<body>

<button class="menu-toggle" id="menuToggle">☰</button>
<div class="sidebar-overlay" id="sidebarOverlay"></div>

<nav class="sidebar" id="sidebar">
  <div class="sidebar-header">
    <h1>📚 期末题库</h1>
  </div>
  <div class="nav-subjects" id="navSubjects"></div>
  <div class="stats-bar">
    <div class="stat-row">
      <span class="stat-label">总题数</span>
      <span class="stat-value" id="totalQ">0</span>
    </div>
    <div class="stat-row">
      <span class="stat-label">已作答</span>
      <span class="stat-value" id="answeredQ">0</span>
    </div>
    <div class="progress-bar"><div class="progress-fill" id="progressFill" style="width:0%"></div></div>
  </div>
</nav>

<div class="main">
  <div class="topbar">
    <div class="search-box">
      <input type="text" id="searchInput" placeholder="搜索题目关键词..." oninput="filterQuestions()">
    </div>
    <div class="topbar-actions">
      <button class="btn" id="toggleAnswerBtn" onclick="toggleAllAnswers()">
        <span>👁</span> 显示全部答案
      </button>
      <button class="btn" id="shuffleBtn" onclick="shuffleQuestions()">
        <span>🔀</span> 随机打乱
      </button>
      <button class="btn" id="restoreBtn" onclick="restoreOrder()" style="display:none">

// ==================== HELPERS ====================
function escapeHtml(s){return s.replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;')}
function nl2br(s){return s.replace(/\n/g,'<br>')}

function renderExamInfo(subjectKey, subjectName){

function isMultiChoice(q) {
  return q.options.length > 0 && q.answer.length > 1 && /^[A-D]+$/.test(q.answer);
}
function isSingleChoice(q) {
  return q.options.length > 0 && q.answer.length === 1 && /^[A-D]$/.test(q.answer);
}
function isChoice(q) {
  return q.options.length > 0 && /^[A-D]+$/.test(q.answer);
}

// ==================== RENDER NAV ====================
function renderNav() {
  var nav = document.getElementById('navSubjects');
  var html = '';
  var keys = Object.keys(DATA);
  for (var ki = 0; ki < keys.length; ki++) {
    var key = keys[ki];
    var subject = DATA[key];
    var isActive = key === currentSubject;
    var isExpanded = expandedSubjects[key];
    if (typeof isExpanded === 'undefined') isExpanded = isActive;
    html += '<div class="nav-subject">';
    html += '<button class="nav-subject-btn ' + (isActive ? 'active' : '') + '">';
    html += '<span class="nav-subject-title" onclick="switchSubject(\'' + key + '\')">';
    html += '<span class="icon">' + subject.icon + '</span><span>' + subject.name + '</span>';
    html += '</span>';
    html += '<span class="nav-toggle ' + (isExpanded ? 'open' : '') + '" onclick="toggleSubjectChapters(event,\'' + key + '\')">▶</span>';
    html += '</button>';
    html += '<div class="nav-chapters ' + (isExpanded ? 'show' : '') + '">';
    if (EXAM_POINTS[key]) {
      html += '<div class="nav-chapter ' + (isActive && currentChapter === -1 ? 'active' : '') + '" onclick="switchChapter(-1)">';
      html += '📌 考点总结</div>';
    }
    for (var i = 0; i < subject.chapters.length; i++) {
      html += '<div class="nav-chapter ' + (isActive && i === currentChapter ? 'active' : '') + '" onclick="switchChapter(' + i + ')">';
      html += subject.chapters[i].name + ' <span class="count">' + subject.chapters[i].questions.length + '题</span></div>';
    }
    html += '</div></div>';
  }
  nav.innerHTML = html;
}

          optClass += ' correct';

// ==================== STATS ====================
function updateStats() {
  document.getElementById('totalQ').textContent = totalQuestions;
  var answeredCount = Object.keys(answeredMap).length;
  document.getElementById('answeredQ').textContent = answeredCount;
  var pct = totalQuestions > 0 ? Math.round(answeredCount / totalQuestions * 100) : 0;
  document.getElementById('progressFill').style.width = pct + '%';
}

// ==================== INTERACTIONS ====================
function toggleSubjectChapters(event, key) {
  if (event) event.stopPropagation();
  expandedSubjects[key] = !expandedSubjects[key];
  renderNav();
}

function switchSubject(key) {
  currentSubject = key;
  currentChapter = 0;
  expandedSubjects[key] = true;
  document.getElementById('searchInput').value = '';
  renderNav();
  renderContent();
}

function switchChapter(i) {
  currentChapter = i;
  document.getElementById('searchInput').value = '';
  renderNav();
  renderContent();
}

function clickOption(qId, letter) {
  if (answeredMap[qId]) return; // already answered

  // Find the question
  var parts = qId.split('-');
  var subjKey = parts[0];
  var chIdx = parseInt(parts[1]);
  var qIdx = parseInt(parts[2]);
  var q = DATA[subjKey].chapters[chIdx].questions[qIdx];

  var isCorrect = false;
  if (isMultiChoice(q)) {
    // For multi: we treat clicking one option as selecting it.
    // But for simplicity, we'll just check if it's part of the answer.
    isCorrect = q.answer.indexOf(letter) >= 0;
  } else {
    isCorrect = q.answer === letter;
  }

  answeredMap[qId] = {selected: [letter], correct: isCorrect};

  // Update UI without full re-render
  var card = document.getElementById('card-' + qId);
  if (!card) { renderContent(); return; }

  // Mark options
  var opts = card.querySelectorAll('.q-opt');
  for (var i = 0; i < opts.length; i++) {
    var optLetter = opts[i].textContent.charAt(0);
    var isCorrectOpt = q.answer.indexOf(optLetter) >= 0;
    opts[i].classList.add('opt-disabled');
    opts[i].removeAttribute('onclick');
    opts[i].style.cursor = 'default';

    if (optLetter === letter) {
      opts[i].classList.add(isCorrect ? 'opt-correct' : 'opt-wrong');
    }
    if (isCorrectOpt) {
      opts[i].classList.add('opt-correct');
    }
  }

  // Add feedback
  var feedbackDiv = document.createElement('div');
  feedbackDiv.className = 'q-feedback show ' + (isCorrect ? 'fb-correct' : 'fb-wrong');
  feedbackDiv.innerHTML = isCorrect ? '✅ 回答正确！' : '❌ 回答错误！正确答案：' + q.answer;
  var optionsDiv = card.querySelector('.q-options');
  if (optionsDiv && optionsDiv.nextSibling) {
    card.insertBefore(feedbackDiv, optionsDiv.nextSibling);
  } else if (optionsDiv) {
    card.appendChild(feedbackDiv);
  }

  // Show answer
  var ansDiv = card.querySelector('.q-answer');
  if (ansDiv) ansDiv.classList.add('show');

  // Shake if wrong
  if (!isCorrect) {
    card.classList.add('shake');
    setTimeout(function(){card.classList.remove('shake')}, 500);
  }

  updateStats();
}

function toggleAllAnswers() {
  showAnswers = !showAnswers;
  var btn = document.getElementById('toggleAnswerBtn');
  if (showAnswers) {
    btn.classList.add('active');
    btn.innerHTML = '<span>🙈</span> 隐藏全部答案';
  } else {
    btn.classList.remove('active');
    btn.innerHTML = '<span>👁</span> 显示全部答案';
  }
  renderContent();
}

function shuffleQuestions() {
  var chapter = DATA[currentSubject].chapters[currentChapter];
  for (var i = chapter.questions.length - 1; i > 0; i--) {
    var j = Math.floor(Math.random() * (i + 1));
    var tmp = chapter.questions[i];
    chapter.questions[i] = chapter.questions[j];
    chapter.questions[j] = tmp;
  }
  document.getElementById('restoreBtn').style.display = '';
  renderContent();
}

function restoreOrder() {
  var orig = originalOrders[currentSubject][currentChapter];
  DATA[currentSubject].chapters[currentChapter].questions = orig.slice();
  document.getElementById('restoreBtn').style.display = 'none';
  renderContent();
}

function filterQuestions() {
  var keyword = document.getElementById('searchInput').value.trim().toLowerCase();
  var cards = document.querySelectorAll('.q-card');
  for (var i = 0; i < cards.length; i++) {
    var stem = cards[i].querySelector('.q-stem').textContent.toLowerCase();
    cards[i].style.display = (!keyword || stem.indexOf(keyword) >= 0) ? '' : 'none';
  }
}

  var keys = Object.keys(answeredMap);
  var count = 0;
  for (var i = 0; i < keys.length; i++) {
    if (keys[i].indexOf(prefix) === 0) {
      delete answeredMap[keys[i]];
      count++;
    }
  }
  // For English listening fill-in chapter, always allow reset (blanks are not in answeredMap)
  var isEngFillIn = currentSubject === 'eng' && currentChapter === 5;
  if (count === 0 && !isEngFillIn) {
    alert('本章还没有作答记录哦！');
    return;
  }
  showAnswers = false;
  var btn = document.getElementById('toggleAnswerBtn');
  btn.classList.remove('active');
  btn.innerHTML = '<span>👁</span> 显示全部答案';
  renderContent();
  updateStats();
}

   passage:`The northwestern Chinese city of Dunhuang is more than 2,000 kilometers from Beijing, but thanks to digital technology, its famous artistic heritage can be just a {click} away for people in the capital. Dunhuang is home to the Mogao Caves, a UNESCO World Heritage Site. The exhibition is a {feast} for the eyes, {featuring} the results of research on nearly 50 sets of cultural relics. While the {painted} sculptures and murals have been replicated using 3D printing, the closed grottoes have been reproduced in a digital format. In order to {protect} the grotto, it is no longer open to the public. However, its digital {restoration} offers an alternative way for visitors. The heritage {displayed} in the exhibition were made possible thanks to Digital Dunhuang. The project {kicked} off in the 1990s, with remarkable {achievements}. Digital technology provides a {means} of preserving China's cultural heritage.`,

var currentLPUnit = 0;

// ==================== TRANSLATION PANEL ====================
function openTranslationPanel(unitIdx) {
  var lu = LISTENING_DATA[unitIdx];
  var transHtml = lu.translation || '暂无译文';
  if (lu.words) {
    for (var w = 0; w < lu.words.length; w++) {
      var cn = lu.words[w].cn;
      var re = new RegExp(cn.replace(/[.*+?^${}()|[\]\\]/g, '\\$&'), 'g');
      transHtml = transHtml.replace(re, '<span class="tp-blank">' + cn + '</span>');
    }
  }
  var html = '<div class="tp-title">' + lu.title + ' ' + lu.subtitle + '</div>';
  html += '<div class="tp-subtitle">下方 <span style="color:var(--accent3);font-weight:600;text-decoration:underline;text-decoration-style:wavy">波浪下划线</span> 标注的位置对应原文填空处</div>';
  html += '<div class="tp-text">' + transHtml + '</div>';
  document.getElementById('tpBody').innerHTML = html;
  document.getElementById('transPanel').classList.add('open');
  document.getElementById('transOverlay').classList.add('show');
}
function closeTranslationPanel() {
  document.getElementById('transPanel').classList.remove('open');
  document.getElementById('transOverlay').classList.remove('show');
}

function openListeningPanel() {
  document.getElementById('listeningPanel').classList.add('open');
  document.getElementById('listeningOverlay').classList.add('show');
  renderLPTabs();
  renderLPContent();
}

function closeListeningPanel() {
  document.getElementById('listeningPanel').classList.remove('open');
  document.getElementById('listeningOverlay').classList.remove('show');
}

function renderLPTabs() {
  var html = '';
  for (var i = 0; i < LISTENING_DATA.length; i++) {
    var u = LISTENING_DATA[i];
    html += '<div class="lp-tab ' + (i === currentLPUnit ? 'active' : '') + '" onclick="switchLPUnit(' + i + ')">' + u.title + '</div>';
  }
  document.getElementById('lpTabs').innerHTML = html;
}

function switchLPUnit(idx) {
  currentLPUnit = idx;
  renderLPTabs();
  renderLPContent();
}

function renderLPContent() {
  var u = LISTENING_DATA[currentLPUnit];
  var passage = u.passage.replace(/\{([^}]+)\}/g, '<span class="blank" onclick="revealBlank(this)">$1</span>');
  var html = '<div class="lp-unit active">';
  html += '<div class="lp-unit-title">' + u.title + '</div>';
  html += '<div class="lp-unit-sub">' + u.subtitle + '</div>';
  html += '<div class="lp-passage">' + passage + '</div>';
  html += '</div>';
  document.getElementById('lpBody').innerHTML = html;
}

function revealBlank(el) {
  el.classList.add('revealed');
}

function revealAllBlanks() {
  var els = document.querySelectorAll('#lpBody .blank');
  for (var i = 0; i < els.length; i++) els[i].classList.add('revealed');
}

function hideAllBlanks() {
  var els = document.querySelectorAll('#lpBody .blank');
  for (var i = 0; i < els.length; i++) els[i].classList.remove('revealed');
}

function revealContentBlank(unitIdx, wordIdx) {
  // Reveal the word tag
  var tag = document.querySelector('.word-tag[data-unit="' + unitIdx + '"][data-idx="' + wordIdx + '"]');
  if (tag) tag.classList.add('revealed');
  // Reveal the corresponding blank in passage
  var blank = document.querySelector('.blank[data-unit="' + unitIdx + '"][data-idx="' + wordIdx + '"]');
  if (blank) { blank.classList.add('revealed'); blank.style.color = 'var(--green)'; blank.textContent = blank.getAttribute('data-word'); }
}

function revealAllContentBlanks() {
  var content = document.getElementById('content');
  content.querySelectorAll('.blank').forEach(function(el) {
    el.classList.add('revealed');
    el.style.color = 'var(--green)';
    var idx = el.getAttribute('data-idx');
    // Find word from the word list to get text
    var tags = content.querySelectorAll('.word-tag');
    for (var t = 0; t < tags.length; t++) {
      if (tags[t].getAttribute('data-idx') === idx && tags[t].getAttribute('data-unit') === el.getAttribute('data-unit')) {
        el.textContent = tags[t].textContent.replace(/^\d+\.\s*/, '');
        break;
      }
    }
  });
  content.querySelectorAll('.word-tag').forEach(function(el) { el.classList.add('revealed'); });
}

function hideAllContentBlanks() {
  var content = document.getElementById('content');
  content.querySelectorAll('.blank').forEach(function(el) {
    el.classList.remove('revealed');
    el.style.color = '';
    el.innerHTML = '&nbsp;&nbsp;&nbsp;';
  });
  content.querySelectorAll('.word-tag').forEach(function(el) { el.classList.remove('revealed'); });
}

// ==================== RENDER EXAM POINTS ====================
function renderExamPoints(subjectKey) {
  var points = EXAM_POINTS[subjectKey];
  if (!points || points.length === 0) return '';
  var html = '<div class="ep-panel">';
  html += '<div class="ep-header" onclick="toggleExamPoints(this)">';
  html += '<h3>📌 考点总结 · 点击展开</h3>';
  html += '<span class="ep-toggle">▼</span>';
  html += '</div>';
  html += '<div class="ep-body">';
  for (var i = 0; i < points.length; i++) {
    html += '<h4>' + points[i].title + '</h4>';
    html += points[i].content;
  }
  html += '</div></div>';
  return html;
}

function toggleExamPoints(header) {
  var body = header.nextElementSibling;
  var toggle = header.querySelector('.ep-toggle');
  body.classList.toggle('open');
  toggle.classList.toggle('open');
}
