<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
<title>资源导航</title>
<style>
*{margin:0;padding:0;box-sizing:border-box}
:root{
  --bg:#0f1117;--surface:#1a1d27;--card:#222536;--card-hover:#2a2e42;
  --border:#2e3348;--text:#e4e6f0;--text2:#9ca0b8;--accent:#6c7cff;
  --accent2:#4ecdc4;--accent3:#ff6b9d;--accent4:#ffd93d;
  --radius:12px;--shadow:0 4px 24px rgba(0,0,0,.3);
}
[data-theme="light"]{
  --bg:#f0f2f5;--surface:#ffffff;--card:#ffffff;--card-hover:#f5f7fa;
  --border:#e0e4ea;--text:#1a1d27;--text2:#6b7280;--accent:#5b6bff;
  --accent2:#0d9488;--accent3:#e11d48;--accent4:#d97706;
  --shadow:0 4px 24px rgba(0,0,0,.08);
}
html{-webkit-text-size-adjust:100%}
body{font-family:'Segoe UI','Microsoft YaHei',sans-serif;background:var(--bg);color:var(--text);min-height:100vh;display:flex;flex-direction:column;align-items:center;transition:background .3s;-webkit-tap-highlight-color:transparent}

/* ===== Topbar ===== */
.topbar{width:100%;position:sticky;top:0;z-index:50;background:rgba(15,17,23,.88);backdrop-filter:blur(20px);-webkit-backdrop-filter:blur(20px);border-bottom:1px solid var(--border);padding:14px 28px;display:flex;align-items:center;justify-content:space-between}
.topbar h1{font-size:18px;font-weight:700;background:linear-gradient(135deg,var(--accent),var(--accent2));-webkit-background-clip:text;-webkit-text-fill-color:transparent}
.topbar-actions{display:flex;gap:8px}
.btn{padding:7px 14px;border:1px solid var(--border);border-radius:8px;background:var(--card);color:var(--text);font-size:12px;cursor:pointer;transition:all .2s;display:flex;align-items:center;gap:5px;white-space:nowrap}
.btn:hover{border-color:var(--accent);color:var(--accent)}

/* ===== Hero ===== */
.hero{text-align:center;padding:64px 24px 40px;max-width:640px}
.hero h2{font-size:36px;font-weight:800;margin-bottom:12px;background:linear-gradient(135deg,var(--accent),var(--accent2));-webkit-background-clip:text;-webkit-text-fill-color:transparent;line-height:1.3}
.hero p{color:var(--text2);font-size:15px;line-height:1.7}

/* ===== Grid ===== */
.grid{display:grid;grid-template-columns:repeat(auto-fill,minmax(260px,1fr));gap:20px;padding:0 28px 64px;width:100%;max-width:920px}
.card{background:var(--card);border:1px solid var(--border);border-radius:var(--radius);padding:24px;text-decoration:none;color:var(--text);transition:all .25s;position:relative;overflow:hidden;display:flex;flex-direction:column;gap:12px}
.card::before{content:'';position:absolute;top:0;left:0;width:4px;height:100%;background:linear-gradient(180deg,var(--accent),var(--accent2));opacity:0;transition:opacity .2s}
.card:hover{border-color:var(--accent);transform:translateY(-3px);box-shadow:var(--shadow)}
.card:hover::before{opacity:1}
.card-icon{font-size:32px}
.card-title{font-size:17px;font-weight:700}
.card-desc{font-size:13px;color:var(--text2);line-height:1.6}
.card-tag{display:inline-block;font-size:11px;background:rgba(108,124,255,.12);color:var(--accent);padding:3px 10px;border-radius:10px;font-weight:600;align-self:flex-start}

/* ===== Footer ===== */
.footer{text-align:center;padding:20px 24px 32px;color:var(--text2);font-size:12px;border-top:1px solid var(--border);width:100%;max-width:920px}
</style>
</head>
<body>

<div class="topbar">
  <h1>📚 资源导航</h1>
  <div class="topbar-actions">
    <button class="btn" id="themeBtn" onclick="toggleTheme()"><span>🌙</span> 暗色</button>
  </div>
</div>

<div class="hero">
  <h2>期末题库 & 学习资源</h2>
  <p>在这里汇总所有在线资源，点击下方卡片即可跳转。</p>
</div>

<div class="grid">
  <a class="card" href="./final-exam/">
    <div class="card-icon">📝</div>
    <div class="card-title">期末题库</div>
    <div class="card-desc">涵盖多门课程的期末复习题库，支持搜索、收藏、随机抽取等功能。</div>
    <div class="card-tag">题库</div>
  </a>

  <!-- 后续新增页面在这里加卡片即可，例如：
  <a class="card" href="./notes/">
    <div class="card-icon">📖</div>
    <div class="card-title">课程笔记</div>
    <div class="card-desc">课程笔记与知识点整理。</div>
    <div class="card-tag">笔记</div>
  </a>
  -->
</div>

<div class="footer">© 2026 Rewmington · GitHub Pages</div>

<script>
function toggleTheme(){
  var isLight=document.body.getAttribute('data-theme')==='light';
  if(isLight){document.body.removeAttribute('data-theme');document.getElementById('themeBtn').innerHTML='<span>🌙</span> 暗色'}
  else{document.body.setAttribute('data-theme','light');document.getElementById('themeBtn').innerHTML='<span>☀️</span> 亮色'}
}
if(localStorage.getItem('theme')==='light'){document.body.setAttribute('data-theme','light');document.getElementById('themeBtn').innerHTML='<span>☀️</span> 亮色'}
</script>
</body>
</html>
