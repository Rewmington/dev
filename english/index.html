<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
<title>大学英语4 - 题库</title>
<style>
*{margin:0;padding:0;box-sizing:border-box}
:root{--bg:#0f1117;--surface:#1a1d27;--card:#222536;--card-hover:#2a2e42;--border:#2e3348;--text:#e4e6f0;--text2:#9ca0b8;--accent:#6c7cff;--accent2:#4ecdc4;--radius:12px;--shadow:0 4px 24px rgba(0,0,0,.3)}
[data-theme="light"]{--bg:#f0f2f5;--surface:#ffffff;--card:#ffffff;--card-hover:#f5f7fa;--border:#e0e4ea;--text:#1a1d27;--text2:#6b7280;--accent:#5b6bff;--accent2:#0d9488;--shadow:0 4px 24px rgba(0,0,0,.08)}
html{-webkit-text-size-adjust:100%}
body{font-family:'Segoe UI','Microsoft YaHei',sans-serif;background:var(--bg);color:var(--text);min-height:100vh;display:flex;flex-direction:column;align-items:center;transition:background .3s}
.topbar{width:100%;position:sticky;top:0;z-index:50;background:rgba(15,17,23,.88);backdrop-filter:blur(20px);border-bottom:1px solid var(--border);padding:14px 28px;display:flex;align-items:center;justify-content:space-between}
.topbar h1{font-size:18px;font-weight:700;background:linear-gradient(135deg,var(--accent),var(--accent2));-webkit-background-clip:text;-webkit-text-fill-color:transparent}
.topbar a{color:var(--accent);text-decoration:none;font-size:13px}
.topbar a:hover{text-decoration:underline}
.topbar-actions{display:flex;gap:8px}
.btn{padding:7px 14px;border:1px solid var(--border);border-radius:8px;background:var(--card);color:var(--text);font-size:12px;cursor:pointer;transition:all .2s;display:flex;align-items:center;gap:5px}
.btn:hover{border-color:var(--accent);color:var(--accent)}
.hero{text-align:center;padding:64px 24px 32px;max-width:640px}
.hero h2{font-size:32px;font-weight:800;margin-bottom:12px;background:linear-gradient(135deg,var(--accent),var(--accent2));-webkit-background-clip:text;-webkit-text-fill-color:transparent;line-height:1.3}
.hero p{color:var(--text2);font-size:15px;line-height:1.7}
.grid{display:grid;grid-template-columns:repeat(auto-fill,minmax(280px,1fr));gap:20px;padding:0 28px 64px;width:100%;max-width:920px}
.card{background:var(--card);border:1px solid var(--border);border-radius:var(--radius);padding:24px;text-decoration:none;color:var(--text);transition:all .25s;position:relative;overflow:hidden;display:flex;flex-direction:column;gap:12px}
.card::before{content:'';position:absolute;top:0;left:0;width:4px;height:100%;opacity:0;transition:opacity .2s}
.card:hover{border-color:var(--accent);transform:translateY(-3px);box-shadow:var(--shadow)}
.card:hover::before{opacity:1}
.card-icon{font-size:36px}
.card-title{font-size:17px;font-weight:700}
.card-desc{font-size:13px;color:var(--text2);line-height:1.6}
.card-tag{display:inline-block;font-size:11px;padding:3px 10px;border-radius:10px;font-weight:600;align-self:flex-start}
.footer{text-align:center;padding:20px 24px 32px;color:var(--text2);font-size:12px;border-top:1px solid var(--border);width:100%;max-width:920px}
</style>
</head>
<body>
<div class="topbar">
  <a href="../index.html">← 返回导航</a>
  <h1>🇬🇧 大学英语4</h1>
  <div class="topbar-actions">
    <button class="btn" id="themeBtn" onclick="toggleTheme()">🌙 暗色</button>
  </div>
</div>
<div class="hero">
  <h2>大学英语4 题库</h2>
  <p>2025-2026-2 第四版 · 听力 + 听说 + 翻译 + 作文</p>
</div>
<div class="grid">
  <a class="card" href="./listening.html">
    <div class="card-icon" style="color:#4ecdc4">🎧</div>
    <div class="card-title">听力填空题</div>
    <div class="card-desc">Unit 1-5 听力段落填空，涵盖文化、节日、旅游、科技、环保等主题。</div>
    <div class="card-tag" style="background:rgba(78,205,196,.12);color:#4ecdc4">听力</div>
  </a>
  <a class="card" href="./speaking.html">
    <div class="card-icon" style="color:#6c7cff">🗣</div>
    <div class="card-title">听说题库</div>
    <div class="card-desc">新闻 + 对话 + 篇章，Unit 1-5 共 50 道选择题，支持在线练习和答案解析。</div>
    <div class="card-tag" style="background:rgba(108,124,255,.12);color:#6c7cff">听说</div>
  </a>
  <a class="card" href="./2025-2026-2大学英语4（第四版）翻译题库.pdf">
    <div class="card-icon" style="color:#ff6b9d">📝</div>
    <div class="card-title">翻译题库</div>
    <div class="card-desc">大学英语4 翻译练习题库（PDF），可在线查看或下载。</div>
    <div class="card-tag" style="background:rgba(255,107,157,.12);color:#ff6b9d">翻译</div>
  </a>
  <a class="card" href="./2025-2026-2大学英语4（第四版）作文题库.pdf">
    <div class="card-icon" style="color:#ffd93d">✏️</div>
    <div class="card-title">作文题库</div>
    <div class="card-desc">大学英语4 写作练习题库（PDF），可在线查看或下载。</div>
    <div class="card-tag" style="background:rgba(255,217,61,.12);color:#ffd93d">作文</div>
  </a>
</div>
<div class="footer">© 2026 Rewmington · GitHub Pages</div>
<script>
function toggleTheme(){var l=document.body.getAttribute('data-theme')==='light';if(l){document.body.removeAttribute('data-theme');document.getElementById('themeBtn').textContent='🌙 暗色'}else{document.body.setAttribute('data-theme','light');document.getElementById('themeBtn').textContent='☀️ 亮色'}}
if(localStorage.getItem('theme')==='light'){document.body.setAttribute('data-theme','light');document.getElementById('themeBtn').textContent='☀️ 亮色'}
</script>
</body>
</html>
