<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
<title>听说题库 - 大学英语4</title>
<style>
*{margin:0;padding:0;box-sizing:border-box}
:root{--bg:#0f1117;--surface:#1a1d27;--card:#222536;--card-hover:#2a2e42;--border:#2e3348;--text:#e4e6f0;--text2:#9ca0b8;--accent:#6c7cff;--accent2:#4ecdc4;--accent3:#ff6b9d;--green:#4ecdc4;--red:#ff6b9d;--radius:12px;--shadow:0 4px 24px rgba(0,0,0,.3)}
[data-theme="light"]{--bg:#f0f2f5;--surface:#ffffff;--card:#ffffff;--card-hover:#f5f7fa;--border:#e0e4ea;--text:#1a1d27;--text2:#6b7280;--accent:#5b6bff;--accent2:#0d9488;--accent3:#e11d48;--green:#0d9488;--red:#e11d48;--shadow:0 4px 24px rgba(0,0,0,.08)}
html{-webkit-text-size-adjust:100%}
body{font-family:'Segoe UI','Microsoft YaHei',sans-serif;background:var(--bg);color:var(--text);min-height:100vh;transition:background .3s}
.topbar{position:sticky;top:0;z-index:50;background:rgba(15,17,23,.88);backdrop-filter:blur(20px);border-bottom:1px solid var(--border);padding:12px 24px;display:flex;align-items:center;gap:12px}
.topbar a{color:var(--accent);text-decoration:none;font-size:13px}
.topbar a:hover{text-decoration:underline}
.topbar h1{font-size:17px;font-weight:700;background:linear-gradient(135deg,var(--accent),var(--accent2));-webkit-background-clip:text;-webkit-text-fill-color:transparent}
.topbar .spacer{flex:1}
.btn{padding:7px 14px;border:1px solid var(--border);border-radius:8px;background:var(--card);color:var(--text);font-size:12px;cursor:pointer;transition:all .2s;display:flex;align-items:center;gap:5px}
.btn:hover{border-color:var(--accent);color:var(--accent)}
.btn.active{background:var(--accent);border-color:var(--accent);color:#fff}
.search-box{position:relative}
.search-box input{width:200px;padding:7px 12px 7px 32px;border:1px solid var(--border);border-radius:8px;background:var(--card);color:var(--text);font-size:12px;outline:none;transition:border .2s}
.search-box input:focus{border-color:var(--accent)}
.search-box::before{content:'🔍';position:absolute;left:10px;top:50%;transform:translateY(-50%);font-size:12px}
.content{max-width:860px;margin:0 auto;padding:24px 20px 60px}
.unit-section{margin-bottom:32px}
.unit-title{font-size:20px;font-weight:700;margin-bottom:16px;padding-bottom:10px;border-bottom:2px solid var(--border);display:flex;align-items:center;gap:8px}
.unit-title .badge{font-size:11px;background:var(--accent);color:#fff;padding:2px 9px;border-radius:12px;font-weight:600}
.q-type{font-size:14px;font-weight:700;color:var(--accent2);margin:20px 0 12px;padding-left:4px}
.q-card{background:var(--card);border:1px solid var(--border);border-radius:var(--radius);padding:16px 18px;margin-bottom:10px;transition:all .25s;position:relative;overflow:hidden}
.q-card::before{content:'';position:absolute;top:0;left:0;width:4px;height:100%;background:var(--accent);opacity:0;transition:opacity .2s}
.q-card:hover{border-color:var(--accent);box-shadow:var(--shadow)}
.q-card:hover::before{opacity:1}
.q-stem{font-size:14px;line-height:1.7;margin-bottom:10px;color:var(--text)}
.q-stem b{color:var(--accent3);font-weight:700}
.q-options{display:flex;flex-direction:column;gap:6px;margin-bottom:10px}
.q-opt{font-size:13px;color:var(--text2);padding:6px 12px;border-radius:8px;background:var(--surface);border:1px solid var(--border);cursor:pointer;transition:all .2s;line-height:1.5}
.q-opt:hover{border-color:var(--accent);color:var(--text)}
.q-opt.correct{background:rgba(78,205,196,.12);border-color:var(--green);color:var(--green)}
.q-opt.wrong{background:rgba(255,107,157,.08);border-color:var(--red);color:var(--red);opacity:.6}
.q-answer{display:none;font-size:12px;color:var(--green);font-weight:600;padding:4px 0}
.q-answer.show{display:block}
.q-card.answered .q-options .q-opt{pointer-events:none}
.counter-bar{display:flex;gap:10px;margin-bottom:20px;flex-wrap:wrap}
.counter-item{background:var(--card);border:1px solid var(--border);border-radius:10px;padding:10px 16px;min-width:100px;text-align:center}
.counter-num{font-size:24px;font-weight:800;background:linear-gradient(135deg,var(--accent),var(--accent2));-webkit-background-clip:text;-webkit-text-fill-color:transparent}
.counter-label{font-size:11px;color:var(--text2);margin-top:2px}
@keyframes fadeIn{from{opacity:0;transform:translateY(6px)}to{opacity:1;transform:translateY(0)}}
.fade-in{animation:fadeIn .35s ease}
@media(max-width:768px){.search-box input{width:140px}.topbar{flex-wrap:wrap}}
</style>
</head>
<body>
<div class="topbar">
  <a href="../index.html">← 返回导航</a>
  <h1>🗣 听说题库</h1>
  <div class="search-box"><input type="text" id="searchInput" placeholder="搜索题目..." oninput="filterQuestions()"></div>
  <div class="spacer"></div>
  <button class="btn" id="showAnswerBtn" onclick="toggleShowAnswer()">👁 显示答案</button>
  <button class="btn" id="themeBtn" onclick="toggleTheme()">🌙 暗色</button>
</div>
<div class="content">
  <div class="counter-bar">
    <div class="counter-item"><div class="counter-num" id="totalCount">0</div><div class="counter-label">总题数</div></div>
    <div class="counter-item"><div class="counter-num" id="doneCount">0</div><div class="counter-label">已练习</div></div>
    <div class="counter-item"><div class="counter-num" id="correctCount">0</div><div class="counter-label">答对</div></div>
    <div class="counter-item"><div class="counter-num" id="accuracy">0%</div><div class="counter-label">正确率</div></div>
  </div>
  <div id="questions"></div>
</div>
<script>
var DATA=[
// ===== U1 =====
{unit:'U1',type:'News',stem:'Why has Nepal banned solo climbers from scaling Mount Qomolangma?',options:['Because the spring climbing season is coming.','It serves as an attempt to decrease accidents.','As the number of climbers is growing staggeringly.','It is an integral part of the legislative reform.'],answer:1},
{unit:'U1',type:'News',stem:'How many climbers reached the summit of Qomolangma from Nepal last year?',options:['8,000.','449.','259.','190.'],answer:1},
{unit:'U1',type:'Conversation',stem:'What does the woman normally do in the morning?',options:['Get up late.','Drink a lot of coffee.','Make her work plans.','Do physical activity.'],answer:3},
{unit:'U1',type:'Conversation',stem:'What is one advantage of the man\'s schedule?',options:['He can arrange more time for social life at night.','He can have less difficulty coping with meetings.','He can enjoy a less distracting work environment.','He can be more focused and productive during the day.'],answer:3},
{unit:'U1',type:'Conversation',stem:'What do the speakers think determines whether someone is an early bird or a night owl?',options:['One\'s sleep quality.','One\'s work schedule.','One\'s individual body clock.','One\'s attitude toward morning exercise.'],answer:2},
{unit:'U1',type:'Conversation',stem:'What should individuals do regarding their schedules according to the speakers?',options:['Sleep less to get more work done.','Change their natural rhythm to match that of others.','Follow a fixed routine regardless of external distractions.','Listen to their body and adjust their schedule accordingly.'],answer:3},
{unit:'U1',type:'Passage',stem:'What tasks does the speaker tend to do first every day?',options:['The quick tasks.','The routine tasks.','The most urgent tasks.','The most difficult tasks.'],answer:0},
{unit:'U1',type:'Passage',stem:'What is one of the suggestions for getting one\'s work done in time?',options:['Getting up as early as possible to work.','Being a night owl and working late at night.','Using emails to improve work efficiency.','Making use of one\'s most productive time of day.'],answer:3},
{unit:'U1',type:'Passage',stem:'How does the speaker deal with emails now?',options:['She checks and responds to them constantly.','She accesses them only during her real work hours.','She no longer responds to the most trivial of them.','She opens her inbox only when it\'s totally necessary.'],answer:3},
{unit:'U1',type:'Passage',stem:'What is the purpose of the talk?',options:['To discuss the importance of email.','To show how to balance work and life.','To share some ideas on how to reduce workload.','To give some tips on how to work more efficiently.'],answer:3},
// ===== U2 =====
{unit:'U2',type:'News',stem:'What has been found in the digestive tracts of the stranded marine creatures?',options:['Marine mammals.','Sea weeds.','Microplastics.','Edible substances.'],answer:2},
{unit:'U2',type:'News',stem:'What makes up the largest proportion of the ingested substance?',options:['Nylon.','Fishing net.','PET.','Polyester.'],answer:0},
{unit:'U2',type:'Conversation',stem:'What is one of the things the woman wishes for at first?',options:['Learning to swim.','Finding a well-paid job.','Seeing her husband soon.','Getting married in a big house.'],answer:3},
{unit:'U2',type:'Conversation',stem:'What difficulties did the man experience in his life?',options:['He had a hard time keeping his marriage.','He got really sick and lost all his valuable things.','He lost his job and wealth and was sick for years.','He was unable to see his children due to poor health.'],answer:2},
{unit:'U2',type:'Conversation',stem:'According to the man, why is true love important for a happy life?',options:['It helps one value little things in life.','It makes couples appreciate each other.','It gives people patience in their job search.','It makes people confident in pursuing their goals.'],answer:0},
{unit:'U2',type:'Conversation',stem:'What is the purpose of the man striking up the conversation?',options:['To tell the woman an interesting life story.','To teach the woman skills to find a good job.','To encourage the woman to pursue a happy marriage.','To give the woman advice on the important things in life.'],answer:3},
{unit:'U2',type:'Passage',stem:'What is predicted about the human population in the next three decades?',options:['The proportion of 15- to 50-year-olds will decrease slightly.','The number of people aged 80 and above will increase by about 22%.','The proportion of people aged 60 and above will increase significantly.','The number of 12- to 22-year-olds will decrease by more than 420 million.'],answer:2},
{unit:'U2',type:'Passage',stem:'What is one impact of an aging human population on society?',options:['Economic productivity is constantly rising.','The range of healthcare services is expanding.','The pension system will be replaced in the near future.','The ratio of working-age people to older people is decreasing.'],answer:3},
{unit:'U2',type:'Passage',stem:'What may be a result of the population changes discussed in the passage?',options:['Instability of housing prices.','Changes in family structure.','An increase in property taxation.','A decrease in population mobility.'],answer:1},
{unit:'U2',type:'Passage',stem:'What does human society need according to the speaker?',options:['Strong trade ties between countries around the world.','Effective policies to reduce social and health costs.','Necessary changes to address the needs of older people.','Rich resources to maintain the traditional family structure.'],answer:2},
// ===== U3 =====
{unit:'U3',type:'News',stem:'Why is Townsville deliberately flooded?',options:['To avert the monsoon rain.','To prevent the collapse of a dam.','To avoid the crocodiles and snakes.','To help the flood water recede.'],answer:1},
{unit:'U3',type:'News',stem:'Why would crocodiles come to Townsville?',options:['They like tranquil waters.','They prefer moving around.','They are searching for floods.','They want to attack the villagers.'],answer:0},
{unit:'U3',type:'Conversation',stem:'What is one reason that makes Big Sky Park attractive to the couple?',options:['It is right in their city.','It is an entertainment park.','It has nice trails and camping sites.','It\'s a park with a beautiful city skyline.'],answer:2},
{unit:'U3',type:'Conversation',stem:'What problem do they try to figure out about going to the park?',options:['Where the No. 32 bus stop is.','What the best route to drive to the park is.','Whether they can find easy parking for their car.','How they can get their camping equipment on the bus.'],answer:2},
{unit:'U3',type:'Conversation',stem:'What will the woman do before their trip?',options:['Buy a big backpack.','Bake a chocolate cake.','Order their favorite food.','Make a detailed trip plan.'],answer:3},
{unit:'U3',type:'Conversation',stem:'What does the couple long to do at the park?',options:['Drink coffee around a campfire.','Have a leisurely barbecue dinner.','Walk together in the beauty of nature.','Take a bike ride around the open spaces.'],answer:2},
{unit:'U3',type:'Passage',stem:'Why should visitors hurry if they want to see the exhibits in the new museum?',options:['The exhibition will last for no more than a week.','The museum opens only during the holiday season.','The museum workers will soon begin their vacation.','Large crowds of visitors will come to the unusual show.'],answer:3},
{unit:'U3',type:'Passage',stem:'What is exhibited in the new museum?',options:['Plenty of televisions that look stylish.','Anything that reflects modern fashion.','Beds and sofas that make people feel relaxed.','Objects that have brought big lifestyle changes.'],answer:3},
{unit:'U3',type:'Passage',stem:'What is the purpose of the exhibition?',options:['To offer a place to rest in our fast-paced societies.','To provide a practical experience for people to think about laziness.','To teach lazy people how to change their behavior and lifestyle.','To show how furniture has changed to meet the needs of modern people.'],answer:1},
{unit:'U3',type:'Passage',stem:'What did the museum\'s founder advise us to do?',options:['Consider laziness an enemy of work.','Slow down, relax, and be lazy for a while.','Make efforts to shorten our working week.','Enjoy our leisure time if our jobs allow us to.'],answer:1},
// ===== U4 =====
{unit:'U4',type:'News',stem:'What is the news mainly about?',options:['Searching for a hit-and-run driver.','A 15-year-old boy riding his bike.','A boy in critical condition.','A dark green or blue Honda Accord.'],answer:0},
{unit:'U4',type:'News',stem:'How much money was offered as reward for information?',options:['$20,000.','$25,000.','$27,000.','$28,000.'],answer:1},
{unit:'U4',type:'Conversation',stem:'What are the speakers talking about?',options:['Potential choices for an art feature for their town.','Some local cinemas hosting entertainment activities.','Job opportunities created by some new art projects in their area.','Proven benefits of having diverse art activities in the community.'],answer:0},
{unit:'U4',type:'Conversation',stem:'What does the woman think of the cinema project?',options:['It\'s her favorite because of its state-of-the-art technology.','It\'s her top choice because of its economic benefits for the town.','It\'s not an ideal project due to possibly limited use by young people.','It\'s not the best choice for the town due to the high construction costs.'],answer:2},
{unit:'U4',type:'Conversation',stem:'What does the woman say about the botanical garden project?',options:['It lacks an appealing variety of plants and birds.','It has a poor environment for immersive activities.','It allows visitors to interact and connect with nature.','It provides great educational opportunities for adults.'],answer:2},
{unit:'U4',type:'Conversation',stem:'What will help lower the maintenance costs of the botanical garden?',options:['An irrigation system with the latest water conservation technology.','An eco-friendly color for facilities to match the natural environment.','A volunteer group that builds a durable and self-sustaining irrigation system.','A building design that adopts the strictest maintenance standards for gardens.'],answer:2},
{unit:'U4',type:'Passage',stem:'What does the passage mainly discuss?',options:['The process of painting the Mona Lisa.','The reasons for the fame of the Mona Lisa.','The influence of the Mona Lisa on Italian art.','The techniques used in preserving the Mona Lisa.'],answer:1},
{unit:'U4',type:'Passage',stem:'Who is the person painted in the Mona Lisa?',options:['A woman who liked painting.','A woman who was a merchant.','The wife of a wealthy merchant.','The wife of a famous Italian artist.'],answer:2},
{unit:'U4',type:'Passage',stem:'What made it possible for the Mona Lisa to survive for centuries?',options:['The quality of the oil paints on the surface.','The texture of the frame holding the painting.','The type of canvas used to protect the wood frame.','The use of a wood panel as the material to paint on.'],answer:3},
{unit:'U4',type:'Passage',stem:'What do we learn about the painting style and techniques used in the Mona Lisa?',options:['The landscape was painted with a unique close-up view.','The subject\'s eyes and nose were painted with shadows.','Some brush marks were left in the background on purpose.','The subject\'s hands and face were painted with great precision.'],answer:3},
// ===== U5 =====
{unit:'U5',type:'News',stem:'What was the cause of the Lewis family\'s tragedy?',options:['It was hurricane Laura.','It was carbon monoxide poisoning.','They died of a natural disaster.','They died in a violent attack.'],answer:1},
{unit:'U5',type:'News',stem:'Why wouldn\'t the family leave their home before the storm?',options:['They didn\'t think the Category 4 hurricane was disastrous.','They had sufficient supply in the garage.','They were afraid of exposure to COVID-19.','They thought the garage was ventilated enough.'],answer:2},
{unit:'U5',type:'Conversation',stem:'Why does the man look upset?',options:['He isn\'t satisfied with his team.','He has too much work to complete.','He has met someone he doesn\'t like.','He is afraid of his demanding manager.'],answer:1},
{unit:'U5',type:'Conversation',stem:'How does the woman say she can help the man?',options:['She can get more people to work on his team.','She can join his team to work for him herself.','She can help him do his work in her free time.','She can get his manager to reduce his workload.'],answer:0},
{unit:'U5',type:'Conversation',stem:'What advice does the woman give to the man?',options:['He should learn to deal with pressure.','He should have confidence in himself.','He should feel free to ask others for help.','He should accept more people into his team.'],answer:2},
{unit:'U5',type:'Conversation',stem:'Why is the restaurant called 365?',options:['It serves 365 different dishes.','It is open for business every day.','It is located at No. 365 on Sixth Street.','It offers seasonal foods all year round.'],answer:1},
{unit:'U5',type:'Passage',stem:'What prediction is made by the global organization mentioned in the passage?',options:['Type II diabetes will become the most common kind of disease.','Diabetes rates among children and young people will be increasing.','The issue of being overweight can hardly be solved in many countries.','Over half of the world\'s population could be overweight or obese by 2035.'],answer:3},
{unit:'U5',type:'Passage',stem:'What are considered the primary causes of the growing issue of being overweight or obese?',options:['Genetic factors and the increase in age.','Increased risks of disease and stress in life.','High-calorie foods and insufficient exercise.','High blood sugar and poor body composition.'],answer:2},
{unit:'U5',type:'Passage',stem:'Compared to men who were just overweight, how much higher is the risk of diabetes for men who were obese?',options:['Three times higher.','Four times higher.','Five and a half times higher.','Three and a half times higher.'],answer:2},
{unit:'U5',type:'Passage',stem:'What is the primary purpose of the passage?',options:['To give suggestions on how to maintain a healthy body weight.','To present statistics on the global issue of overweight and obesity.','To explain the link between weight and the risk of diabetes in older adults.','To report how researchers studied the risk of diabetes in older people.'],answer:1}
];

var stats={total:DATA.length,done:0,correct:0};
var showAnswer=false;

function renderQuestions(){
  var html='';
  var units=['U1','U2','U3','U4','U5'];
  var unitNames={U1:'Unit 1',U2:'Unit 2',U3:'Unit 3',U4:'Unit 4',U5:'Unit 5'};
  for(var u=0;u<units.length;u++){
    var items=DATA.filter(function(d){return d.unit===units[u]});
    if(!items.length) continue;
    html+='<div class="unit-section fade-in">';
    html+='<div class="unit-title">'+unitNames[units[u]]+'<span class="badge">'+items.length+'题</span></div>';
    var lastType='';
    for(var i=0;i<items.length;i++){
      var q=items[i];
      if(q.type!==lastType){
        html+='<div class="q-type">'+q.type+'</div>';
        lastType=q.type;
      }
      var idx=DATA.indexOf(q);
      html+='<div class="q-card" id="q'+idx+'">';
      html+='<div class="q-stem">'+(idx+1)+'. '+q.stem+'</div>';
      html+='<div class="q-options">';
      for(var j=0;j<q.options.length;j++){
        html+='<div class="q-opt" data-q="'+idx+'" data-opt="'+j+'" onclick="checkAnswer('+idx+','+j+')">'+String.fromCharCode(65+j)+'. '+q.options[j]+'</div>';
      }
      html+='</div>';
      html+='<div class="q-answer" id="ans'+idx+'">✓ 正确答案：'+String.fromCharCode(65+q.answer)+'</div>';
      html+='</div>';
    }
    html+='</div>';
  }
  document.getElementById('questions').innerHTML=html;
  document.getElementById('totalCount').textContent=stats.total;
  updateCounters();
}

function checkAnswer(qIdx,optIdx){
  var card=document.getElementById('q'+qIdx);
  if(card.classList.contains('answered')) return;
  card.classList.add('answered');
  var opts=card.querySelectorAll('.q-opt');
  var q=DATA[qIdx];
  stats.done++;
  if(optIdx===q.answer){
    stats.correct++;
    opts[optIdx].classList.add('correct');
  }else{
    opts[optIdx].classList.add('wrong');
    opts[q.answer].classList.add('correct');
  }
  document.getElementById('ans'+qIdx).classList.add('show');
  updateCounters();
}

function updateCounters(){
  document.getElementById('doneCount').textContent=stats.done;
  document.getElementById('correctCount').textContent=stats.correct;
  document.getElementById('accuracy').textContent=stats.done?Math.round(stats.correct/stats.done*100)+'%':'0%';
}

function toggleShowAnswer(){
  showAnswer=!showAnswer;
  var btn=document.getElementById('showAnswerBtn');
  btn.classList.toggle('active',showAnswer);
  var cards=document.querySelectorAll('.q-card');
  for(var i=0;i<cards.length;i++){
    var ans=cards[i].querySelector('.q-answer');
    if(ans) ans.classList.toggle('show',showAnswer);
  }
}

function filterQuestions(){
  var keyword=document.getElementById('searchInput').value.toLowerCase();
  var cards=document.querySelectorAll('.q-card');
  for(var i=0;i<cards.length;i++){
    var stem=cards[i].querySelector('.q-stem').textContent.toLowerCase();
    cards[i].style.display=stem.indexOf(keyword)>-1?'':'none';
  }
}

function toggleTheme(){
  var isLight=document.body.getAttribute('data-theme')==='light';
  if(isLight){document.body.removeAttribute('data-theme');document.getElementById('themeBtn').textContent='🌙 暗色'}
  else{document.body.setAttribute('data-theme','light');document.getElementById('themeBtn').textContent='☀️ 亮色'}
}
if(localStorage.getItem('theme')==='light'){document.body.setAttribute('data-theme','light');document.getElementById('themeBtn').textContent='☀️ 亮色'}

renderQuestions();
</script>
</body>
</html>
